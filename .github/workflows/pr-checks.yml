name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ── Type check ─────────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: ESLint
        run: npm run lint --if-present

  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npm test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}

  # ── Dependency vulnerability scan ──────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (HIGH and CRITICAL only)
        run: npm audit --audit-level=high

  # ── RLS isolation integration test ────────────────────────────────────────
  rls-isolation:
    name: RLS Isolation Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: billinx
          POSTGRES_PASSWORD: billinx_secret
          POSTGRES_DB: billinx
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://billinx:billinx_secret@localhost:5432/billinx
      MIGRATION_DATABASE_URL: postgresql://billinx:billinx_secret@localhost:5432/billinx
      # billinx_app dev password is set in the migration (safe for CI ephemeral DB)
      APP_DATABASE_URL: postgresql://billinx_app:billinx_app_dev_CHANGE_IN_PROD@localhost:5432/billinx
      NODE_ENV: test
      JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations (owner role)
        run: npm run db:migrate:deploy

      - name: Run RLS isolation integration test
        run: npm run test:integration

  # ── Secret scanning: gitleaks ────────────────────────────────────────────────
  # Scans every commit introduced by the PR for leaked credentials.
  # .gitleaks.toml allowlists the two commits containing a known-inert RSA
  # placeholder pending a git-history scrub — see that file for details.
  # GITLEAKS_ENABLE_COMMENTS=false disables the gitleaks GitHub App integration
  # (which requires a paid licence) while preserving fail-on-finding behaviour.
  secret-scan-gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "false"

  # ── Secret scanning: TruffleHog ──────────────────────────────────────────────
  # Second scanner for defence-in-depth: gitleaks and TruffleHog have different
  # detection signatures so together they catch more. TruffleHog scans the full
  # git history (base: "" = from the initial commit) with --only-verified so
  # that the known-inert RSA placeholder in history is suppressed automatically
  # (it cannot verify against any real service). See .trufflehog.yml for context.
  secret-scan-trufflehog:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog (full history, verified secrets only)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --only-verified

  # ── Docker build check ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: billinx-api:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
