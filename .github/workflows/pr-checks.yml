name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ── Type check ─────────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: ESLint
        run: npm run lint --if-present

  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npm test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}

  # ── Frontend unit tests ─────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run frontend tests
        working-directory: apps/web
        run: npm test

  # ── E2E Tests (Playwright) ──────────────────────────────────────────────────
  # 5 critical-journey browser tests against a real backend + Postgres + Redis
  # + the mock NRS adapter. needs: [test, frontend-tests] — those are the
  # actual job ids in this file (not "backend-tests"). Postgres/Redis service
  # containers mirror the rls-isolation job below; Redis is additionally
  # required here because invoice submission goes through a real BullMQ queue.
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test, frontend-tests]
    permissions:
      contents: read
      pull-requests: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: billinx
          POSTGRES_PASSWORD: billinx_secret
          POSTGRES_DB: billinx
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://billinx:billinx_secret@localhost:5432/billinx
      MIGRATION_DATABASE_URL: postgresql://billinx:billinx_secret@localhost:5432/billinx
      REDIS_URL: redis://localhost:6379
      # Not "production": that branch of validateEnvironment() requires AWS/
      # Secrets-Manager vars this job has no way to provide. "test" matches
      # the same convention already used by the `test` and `rls-isolation`
      # jobs above.
      NODE_ENV: test
      PORT: "3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Generate ephemeral JWT signing key
        # This job is the only CI job that actually boots the compiled app
        # (`node dist/src/main`), so it's the only one that hits
        # validateEnvironment()'s development-mode JWT_PRIVATE_KEY check.
        # Previously this read secrets.JWT_PRIVATE_KEY/JWT_PUBLIC_KEY, which
        # aren't configured in this repo — the app boot failed with "Missing
        # required environment variables: JWT_PRIVATE_KEY" and the servers
        # never came up before the wait-on timeout. A fresh RSA-2048 keypair
        # generated per-run is sufficient here: these tokens only need to be
        # internally self-consistent for the lifetime of this one job (the
        # E2E suite logs in through the real login form and verifies the
        # token it gets back, it doesn't check against a fixed key), so
        # there's no need to depend on a persisted repo secret at all.
        run: |
          openssl genrsa -out /tmp/e2e_jwt_private.pem 2048
          openssl rsa -in /tmp/e2e_jwt_private.pem -pubout -out /tmp/e2e_jwt_public.pem
          {
            echo "JWT_PRIVATE_KEY<<JWT_KEY_EOF"
            cat /tmp/e2e_jwt_private.pem
            echo "JWT_KEY_EOF"
          } >> "$GITHUB_ENV"
          {
            echo "JWT_PUBLIC_KEY<<JWT_KEY_EOF"
            cat /tmp/e2e_jwt_public.pem
            echo "JWT_KEY_EOF"
          } >> "$GITHUB_ENV"
          rm -f /tmp/e2e_jwt_private.pem /tmp/e2e_jwt_public.pem

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        # --with-deps: a bare ubuntu-latest runner is missing the system
        # libraries (libnss3, fonts, etc.) Chromium needs to launch headless
        # at all — without this flag the very first browser.launch() fails.
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npm run db:migrate:deploy

      - name: Seed reference data and test users
        # seed-reference-data.ts populates the HS/service-code lookup tables
        # the New Invoice form's line-item classification search queries —
        # without it, invoice-round-trip.spec.ts's ISIC code search returns
        # no results to click. seed-dev-users.ts creates the owner (with MFA
        # pre-enabled using a fixed E2E-only TOTP secret — see that script)
        # and viewer test accounts apps/web/e2e/helpers/auth.ts logs in as.
        run: |
          npx tsx scripts/seed-reference-data.ts
          npx tsx scripts/seed-dev-users.ts

      - name: Build backend
        run: npm run build

      - name: Start API server
        run: node dist/src/main &

      - name: Start web server
        working-directory: apps/web
        # -p 3001, not the "dev" script's bare default of 3000 — that would
        # collide with the API server above.
        run: npm run dev -- -p 3001 &

      - name: Wait for servers to be ready
        run: |
          npx wait-on http://localhost:3000/health
          npx wait-on http://localhost:3001
        timeout-minutes: 2

      - name: Run Playwright tests
        id: playwright
        working-directory: apps/web
        run: npx playwright test
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Parse test results
        id: results
        if: always()
        run: |
          if [ -f apps/web/playwright-report/results.json ]; then
            TOTAL=$(node -e "console.log(require('./apps/web/playwright-report/results.json').stats.expected)")
            FAILED=$(node -e "console.log(require('./apps/web/playwright-report/results.json').stats.unexpected)")
            PASSED=$((TOTAL - FAILED))
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment on failure
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const status = '${{ steps.playwright.outcome }}';
            const passed = '${{ steps.results.outputs.passed }}';
            const failed = '${{ steps.results.outputs.failed }}';
            const total = '${{ steps.results.outputs.total }}';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            let body = '';

            if (status === 'success') {
              body = [
                '## ✅ E2E Tests Passed',
                '',
                `All ${total} test(s) passed (5 critical journeys, plus one-time auth setup).`,
                '',
                '| Journey | Result |',
                '|---------|--------|',
                '| Invoice Round-Trip (create, submit, verify display) | ✅ Passed |',
                '| Dashboard (no NaN values) | ✅ Passed |',
                '| PDF Download | ✅ Passed |',
                '| Recurring Invoice CRUD | ✅ Passed |',
                '| Role-Based Access | ✅ Passed |',
              ].join('\n');
            } else {
              body = [
                '## ❌ E2E Tests Failed',
                '',
                `**${failed} of ${total} test(s) failed.**`,
                '',
                '> Screenshots and videos of failures are in the test report.',
                '',
                `[📊 View Full Playwright Report](${runUrl})`,
                '',
                '**Download the report:**',
                '1. Click the link above',
                '2. Scroll to Artifacts at the bottom',
                '3. Download `playwright-report`',
                '4. Open `index.html` in your browser',
                '',
                '**What to do:**',
                '- Check which journey failed in the report',
                '- Review the screenshot to see what the browser showed',
                '- Fix the issue before merging this PR',
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Fail job if tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1

  # ── Dependency vulnerability scan ──────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (HIGH and CRITICAL only)
        run: npm audit --audit-level=high

  # ── RLS isolation integration test ────────────────────────────────────────
  rls-isolation:
    name: RLS Isolation Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: billinx
          POSTGRES_PASSWORD: billinx_secret
          POSTGRES_DB: billinx
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://billinx:billinx_secret@localhost:5432/billinx
      MIGRATION_DATABASE_URL: postgresql://billinx:billinx_secret@localhost:5432/billinx
      # billinx_app dev password is set in the migration (safe for CI ephemeral DB)
      APP_DATABASE_URL: postgresql://billinx_app:billinx_app_dev_CHANGE_IN_PROD@localhost:5432/billinx
      NODE_ENV: test
      JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations (owner role)
        run: npm run db:migrate:deploy

      - name: Run RLS isolation integration test
        run: npm run test:integration

  # ── Secret scanning: gitleaks ────────────────────────────────────────────────
  # Scans every commit introduced by the PR for leaked credentials.
  # .gitleaks.toml allowlists the two commits containing a known-inert RSA
  # placeholder pending a git-history scrub — see that file for details.
  # GITLEAKS_ENABLE_COMMENTS=false disables the gitleaks GitHub App integration
  # (which requires a paid licence) while preserving fail-on-finding behaviour.
  secret-scan-gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "false"

  # ── Secret scanning: TruffleHog ──────────────────────────────────────────────
  # Second scanner for defence-in-depth: gitleaks and TruffleHog have different
  # detection signatures so together they catch more. TruffleHog scans the full
  # git history (base: "" = from the initial commit) with --only-verified so
  # that the known-inert RSA placeholder in history is suppressed automatically
  # (it cannot verify against any real service). See .trufflehog.yml for context.
  secret-scan-trufflehog:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog (full history, verified secrets only)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --only-verified

  # ── Docker build check ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: billinx-api:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
