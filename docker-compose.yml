version: "3.9"

services:
  # ── Billinx API ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: billinx-api:local
    container_name: billinx-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-billinx}:${POSTGRES_PASSWORD:-billinx_secret}@postgres:5432/${POSTGRES_DB:-billinx}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-billinx-dev-secret-change-in-production}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-billinx-admin-secret-change-in-production}
      AWS_REGION: ${AWS_REGION:-af-south-1}
      AWS_SES_REGION: ${AWS_SES_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Billinx <noreply@billinx.ng>}
      APP_BASE_URL: ${APP_BASE_URL:-https://app.billinx.ng}
      MFA_ISSUER: ${MFA_ISSUER:-Billinx}
      CAC_API_BASE_URL: ${CAC_API_BASE_URL:-}
      CAC_API_KEY: ${CAC_API_KEY:-}
      INTERSWITCH_SANDBOX_URL: ${INTERSWITCH_SANDBOX_URL:-https://qa.interswitchgroup.com}
      INTERSWITCH_PROD_URL: ${INTERSWITCH_PROD_URL:-https://api.interswitchgroup.com}
      # AWS Secrets Manager IDs
      JWT_PRIVATE_KEY_SECRET_ID: ${JWT_PRIVATE_KEY_SECRET_ID:-billinx/jwt/private-key}
      JWT_PUBLIC_KEY_SECRET_ID: ${JWT_PUBLIC_KEY_SECRET_ID:-billinx/jwt/public-key}
      MASTER_KEY_SECRET_ID: ${MASTER_KEY_SECRET_ID:-billinx/encryption/master-key}
      ADMIN_KEY_SECRET_ID: ${ADMIN_KEY_SECRET_ID:-billinx/admin/key-hash}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - billinx-net

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: billinx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-billinx}
      POSTGRES_USER: ${POSTGRES_USER:-billinx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-billinx_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-billinx} -d ${POSTGRES_DB:-billinx}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - billinx-net

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: billinx-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --appendonly yes
      --appendfsync everysec
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - billinx-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  billinx-net:
    driver: bridge
